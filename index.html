<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clear — Contact</title>
  <style>
    :root {
      --ink: #0B0B0B;
      --mint: #67EFC3;
      --mint-light: #EAFBF4;
      --grey: #6B6B6B;
      --line: #ECECEC;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Calibri, sans-serif;
      background: #FAFAFA;
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 720px;
      background: #FFFFFF;
      border-radius: 20px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.06);
      padding: 48px 44px 36px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      top: -60px;
      right: -60px;
      width: 160px;
      height: 160px;
      background: var(--mint);
      border-radius: 50%;
      opacity: 0.18;
    }

    .logo {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo img {
      height: 34px;
      width: auto;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;
      gap: 20px;
      position: relative;
      z-index: 1;
    }

    .cell {
      border: 2px solid var(--mint);
      border-radius: 16px;
      padding: 22px 22px 20px;
      background: var(--mint-light);
    }

    .tag {
      display: inline-block;
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--ink);
      background: var(--mint);
      padding: 3px 9px;
      border-radius: 20px;
      margin-bottom: 14px;
    }

    .name {
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 4px;
    }

    .role {
      font-size: 12px;
      margin-bottom: 2px;
      color: var(--grey);
      line-height: 1.5;
    }

    .detail {
      font-size: 12.5px;
      margin-top: 12px;
    }

    .detail a {
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid var(--ink);
      padding-bottom: 1px;
    }

    .detail a:hover {
      color: #000;
    }

    .ig-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .ig-icon-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 50px;
      height: 50px;
      border-radius: 14px;
      background: #FFFFFF;
      flex-shrink: 0;
    }

    .ig-icon {
      width: 28px;
      height: 28px;
    }

    .footer {
      margin-top: 36px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      font-size: 11px;
      color: var(--grey);
      text-align: center;
      letter-spacing: 0.5px;
      position: relative;
      z-index: 1;
    }

    @media (max-width: 560px) {
      .card {
        padding: 36px 26px 28px;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
